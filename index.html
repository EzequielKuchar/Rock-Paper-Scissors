<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <button id="scissors">Scissors!</button>
    <button id="paper">Paper!</button>
    <button id="rock">Rock!</button>

    <script>
        function getComputerChoice() {
            let randomNumber = Math.floor(Math.random() * 3);
            switch (randomNumber) {
                case 0:
                    return 'ROCK';
                case 1:
                    return 'PAPER';
                case 2:
                    return 'SCISSORS';
            }
        }

        let computerScore = 0;
        let humanScore = 0;

        function playRound(h, c) {
            if (h == 'ROCK' && c == 'PAPER') {
                computerScore += 1;
                console.log("You lose! Paper beats rock");
            } else if (h == 'ROCK' && c == 'ROCK') {
                console.log("Tie! Rock = Rock");
            } else if (h == 'ROCK' && c == 'SCISSORS') {
                humanScore += 1;
                console.log("You win! Rock beats scissors");
            } else if (h == 'SCISSORS' && c == 'PAPER') {
                humanScore += 1;
                console.log("You win! Scissors beat paper");
            } else if (h == 'SCISSORS' && c == 'SCISSORS') {
                console.log('Tie! Scissors = Scissors');
            } else if (h == 'SCISSORS' && c == 'ROCK') {
                computerScore += 1;
                console.log("You lose! Rock beats scissors");
            } else if (h == 'PAPER' && c == 'ROCK') {
                humanScore += 1;
                console.log("You win! Paper beats rock");
            } else if (h == 'PAPER' && c == 'PAPER') {
                console.log("Tie! Paper = Paper");
            } else if (h == 'PAPER' && c == 'SCISSORS') {
                computerScore += 1;
                console.log("You lose! Scissors beat paper");
            }
        }

        function playGame() {
            if (computerScore > humanScore) {
                console.log("Computer Wins " + computerScore + " to " + humanScore);
            } else if (computerScore < humanScore) {
                console.log("Human Wins " + humanScore + " to " + computerScore);
            } else {
                console.log("Tie");
            }
        }

        document.addEventListener("DOMContentLoaded", function() {
            const scissorButton = document.querySelector("#scissors");
            const paperButton = document.querySelector("#paper");
            const rockButton = document.querySelector("#rock");

            if (scissorButton) {
                scissorButton.addEventListener("click", function() {
                    playRound("SCISSORS", getComputerChoice());
                });
            } else {
                console.error('El botón de tijeras no existe en el DOM.');
            }

            if (paperButton) {
                paperButton.addEventListener("click", function() {
                    playRound("PAPER", getComputerChoice());
                });
            } else {
                console.error('El botón de papel no existe en el DOM.');
            }

            if (rockButton) {
                rockButton.addEventListener("click", function() {
                    playRound("ROCK", getComputerChoice());
                });
            } else {
                console.error('El botón de roca no existe en el DOM.');
            }
        });
    </script>
</body>
</html>
